# Global mise configuration — installed to ~/.config/mise/config.toml by
# install.sh. Tools, environment, and setup tasks all live here; install.sh
# is only a thin bootstrapper (install mise → download this file →
# `mise install` → `mise run setup`).

[tools]
node = "latest"
"npm:pnpm" = "latest"
bun = "latest"
github-cli = "latest"
ghq = "latest"
jq = "latest"
uv = "latest"
"cargo:similarity-ts" = "latest"
"npm:@antfu/ni" = "latest"
"npm:@openai/codex" = "latest"
opencode = "latest"
oci = "latest"
cloudflared = "latest"
wrangler = "latest"

[tools."npm:ctx7"]
version = "latest"
postinstall = "npx ctx7@latest setup --cli --claude --opencode --cursor --yes"

# playwright-cli is deprecated; use @playwright/cli
[tools."npm:@playwright/cli"]
version = "latest"
postinstall = "npx skills add microsoft/playwright-cli -y -g -a claude-code -a opencode -a cursor"

[tools."npm:difit"]
version = "latest"
postinstall = "npx skills add yoshiko-pg/difit -y -g -a claude-code -a opencode -a cursor"

[tools."github:rtk-ai/rtk"]
version = "latest"
# rtk init needs ~/.claude to exist before it can write RTK.md there.
postinstall = "mkdir -p \"$HOME/.claude\" && rtk init -g --auto-patch && rtk init -g --opencode --auto-patch && rtk init -g --agent cursor --auto-patch"

[env]
# Claude Code installs to ~/.local/bin; make it visible to setup tasks and
# any shell where mise is activated.
_.path = ["{{env.HOME}}/.local/bin"]

[hooks]
# Run after `mise install` (no shell activation required); keeps git defaults
# colocated with tool config instead of scripted in install.sh.
postinstall = "git config --global init.defaultBranch main"

[settings]
# Auto-install tools when entering directories with .tool-versions or .mise.toml
auto_install = true

# Use latest stable versions
experimental = false

# --- Setup tasks ------------------------------------------------------------
# Everything below used to live in install.sh. Re-run the whole setup any
# time with `mise run setup`, or a single piece (e.g. `mise run setup:skills`).

[tasks.setup]
description = "Run the full dotfiles setup (Claude Code, skills, Codex plugin)"
depends = ["setup:claude", "setup:skills", "setup:codex"]

[tasks."setup:claude"]
description = "Install Claude Code plus its settings.json and status line"
shell = "bash -c"
run = '''
# Install Claude Code via the official installer (not mise/npm, which cannot
# complete the native binary postinstall)
if ! command -v claude &> /dev/null; then
    echo "📦 Installing Claude Code..."
    if curl -fsSL https://claude.ai/install.sh | bash; then
        echo "✓ Claude Code installed"
    else
        echo "⚠ Claude Code installation failed; skipping"
    fi
else
    echo "✓ Claude Code is already installed"
fi

echo "📦 Setting up Claude Code configuration..."
mkdir -p "$HOME/.claude/skills"
CLAUDE_SETTINGS="$HOME/.claude/settings.json"
REMOTE_SETTINGS="$(mktemp)"
if curl -fsSL https://raw.githubusercontent.com/bmthd/dotfiles/main/.claude/settings.json -o "$REMOTE_SETTINGS"; then
    if [ -f "$CLAUDE_SETTINGS" ] && command -v jq &> /dev/null; then
        # Deep-merge remote settings into existing ones (remote wins on conflicts)
        MERGED_SETTINGS="$(mktemp)"
        if jq -s '.[0] * .[1]' "$CLAUDE_SETTINGS" "$REMOTE_SETTINGS" > "$MERGED_SETTINGS" 2>/dev/null; then
            mv "$MERGED_SETTINGS" "$CLAUDE_SETTINGS"
            echo "✓ Merged Claude Code settings into existing $CLAUDE_SETTINGS"
        else
            rm -f "$MERGED_SETTINGS"
            echo "⚠ Failed to merge settings; keeping existing $CLAUDE_SETTINGS unchanged"
        fi
    else
        mv "$REMOTE_SETTINGS" "$CLAUDE_SETTINGS"
        echo "✓ Installed Claude Code settings to $CLAUDE_SETTINGS"
    fi
else
    echo "⚠ Failed to download Claude Code settings"
fi
rm -f "$REMOTE_SETTINGS"

if curl -fsSL https://raw.githubusercontent.com/bmthd/dotfiles/main/.claude/statusline.sh -o "$HOME/.claude/statusline.sh"; then
    chmod +x "$HOME/.claude/statusline.sh"
    echo "✓ Claude Code status line installed"
else
    echo "⚠ Failed to download Claude Code status line"
fi
'''

[tasks."setup:skills"]
description = "Install agent skills for Claude Code, OpenCode, and Cursor"
shell = "bash -c"
run = '''
# Skill directories for each agent CLI (Cursor reads ~/.agents/skills)
mkdir -p "$HOME/.claude/skills" "$HOME/.config/opencode/skills" "$HOME/.agents/skills"

# Install skills via the `skills` CLI — one mechanism for every source.
# Own skills live in this repo's .agents/skills/; third-party skills come from
# their upstream repos. grill-me pulls only grill-me + its grilling dependency.
# Update any of them later with `npx skills update`.
echo "📦 Installing skills..."
install_skills() {
    local label="$1"; shift
    npx skills add "$@" -y -g -a claude-code -a opencode -a cursor 2>/dev/null \
      && echo "✓ $label skills installed" \
      || echo "⚠ $label skills installation failed (continuing)"
}
install_skills "own" bmthd/dotfiles
install_skills "superpowers" obra/superpowers
install_skills "grill-me" mattpocock/skills -s grill-me -s grilling
'''

[tasks."setup:codex"]
description = "Install the official Codex plugin for Claude Code"
depends = ["setup:claude"]
shell = "bash -c"
run = '''
echo "📦 Setting up Codex plugin..."
if command -v claude &> /dev/null; then
    claude plugin marketplace add openai/codex-plugin-cc 2>/dev/null \
      && claude plugin install codex@openai-codex -s user 2>/dev/null \
      && echo "✓ Codex plugin installed" \
      || echo "⚠ Codex plugin installation failed (continuing)"
else
    echo "⚠ claude not found on PATH; skipping Codex plugin installation"
fi
'''
