[tools]
node = "latest"
"npm:pnpm" = "latest"
bun = "latest"
github-cli = "latest"
jq = "latest"
uv = "latest"
"github:mizchi/similarity" = "latest"
"npm:@antfu/ni" = "latest"
"npm:@playwright/cli" = "latest"
"npm:@anthropic-ai/claude-code" = "latest"
"npm:@openai/codex" = "latest"
opencode = "latest"
[tools."npm:difit"]
version = "latest"
postinstall = "npx skills add yoshiko-pg/difit"

[settings]
# Auto-install tools when entering directories with .tool-versions or .mise.toml
auto_install = true

# Use latest stable versions
experimental = false
