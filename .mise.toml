[tools]
node = "latest"
"npm:pnpm" = "latest"
bun = "latest"
github-cli = "latest"
ghq = "latest"
jq = "latest"
uv = "latest"
"cargo:similarity-ts" = "latest"
"npm:@antfu/ni" = "latest"
"npm:@openai/codex" = "latest"
opencode = "latest"
oci = "latest"
cloudflared = "latest"
wrangler = "latest"
[tools."npm:ctx7"]
version = "latest"
postinstall = "npx ctx7@latest setup --cli --claude --opencode --yes"
[tools."npm:@playwright/cli"]
version = "latest"
postinstall = "npx skills add microsoft/playwright-cli -y -g -a claude-code -a opencode"
[tools."npm:difit"]
version = "latest"
postinstall = "npx skills add yoshiko-pg/difit -y -g -a claude-code -a opencode"
[tools."github:rtk-ai/rtk"]
version = "latest"
# rtk init needs ~/.claude to exist before it can write RTK.md there.
postinstall = "mkdir -p \"$HOME/.claude\" && rtk init -g --auto-patch && rtk init -g --opencode --auto-patch"

[hooks]
# Run after `mise install` (no shell activation required); keeps git defaults
# colocated with tool config instead of scripted in install.sh.
postinstall = "git config --global init.defaultBranch main"

[settings]
# Auto-install tools when entering directories with .tool-versions or .mise.toml
auto_install = true

# Use latest stable versions
experimental = false
